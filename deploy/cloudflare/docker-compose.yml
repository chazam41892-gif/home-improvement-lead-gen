services:
  leadgen:
    build:
      context: ../..
      dockerfile: Dockerfile
    env_file:
      - ../../.env
    environment:
      - RELOAD=0
      - PORT=8080
      - HOST=0.0.0.0
    volumes:
      - leadgen_data:/app/data
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel run --token ${TUNNEL_TOKEN}
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    depends_on:
      - leadgen
    restart: always

volumes:
  leadgen_data:
