services:
  leadgen:
    build:
      context: ../..
      dockerfile: Dockerfile
    env_file:
      - ../../.env
    environment:
      - RELOAD=0
      - PORT=8080
      - HOST=0.0.0.0
      - AUTH_DISABLED=1
      - API_KEY=mOy894iysZ38GGal2uHaBuSvN6LnPA02o1Iw8cKAQGU
      - JWT_SECRET=cIpKhW-7XxooT2TtKVcrJHSYNbJLymYsQTWAHQzmLm2zH42CYeritEcLf_Nx1i8d
    volumes:
      - leadgen_data:/app/data
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --config /etc/cloudflared/config.yml run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    volumes:
      - ./config.yml:/etc/cloudflared/config.yml:ro
      - ~/.cloudflared:/home/nonroot/.cloudflared:ro
    depends_on:
      - leadgen
    restart: always

volumes:
  leadgen_data:
