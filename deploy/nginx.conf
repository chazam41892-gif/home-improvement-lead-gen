upstream leadgen {
    server localhost:8080;
}

limit_req_zone $binary_remote_addr zone=leadgen_limit:10m rate=10r/s;

server {
    listen 80;
    server_name growth.leviathansi.xyz;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name growth.leviathansi.xyz;

    ssl_certificate     /etc/letsencrypt/live/growth.leviathansi.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/growth.leviathansi.xyz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 10M;

    access_log /var/log/nginx/leadgen-access.log;
    error_log  /var/log/nginx/leadgen-error.log;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location /static/ {
        alias /app/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        limit_req zone=leadgen_limit burst=20 nodelay;

        proxy_pass http://leadgen;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
