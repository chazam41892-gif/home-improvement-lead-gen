server {
    listen 80;
    listen 443 ssl http2;
    server_name growth.leviathansi.xyz localhost;

    client_max_body_size 50M;

    ssl_certificate /etc/letsencrypt/live/growth.leviathansi.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/growth.leviathansi.xyz/privkey.pem;

    location / {
        proxy_pass http://leadgen:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }
}
